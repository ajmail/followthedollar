<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Follow The Dollar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f5f2eb;
    --red: #e8341a;
    --dim: #2a2a2a;
    --mid: #444;
    --muted: #888;
    --card: #141414;
    --border: #222;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* GRAIN OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 48px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(12px);
  }

  .nav-logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .nav-logo span { color: var(--red); }

  .nav-links {
    display: flex;
    gap: 40px;
    list-style: none;
    overflow-x: auto;
    scrollbar-width: none;
  }
  
  .nav-links::-webkit-scrollbar { 
    display: none; 
  }

  .nav-links a {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
    white-space: nowrap;
  }

  .nav-links a:hover { color: var(--white); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    padding-top: 80px;
    position: relative;
    overflow: hidden;
  }

  .hero-left {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 48px;
    position: relative;
    z-index: 2;
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.2s;
  }

  .hero-headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 8vw, 120px);
    line-height: 0.92;
    letter-spacing: 0.02em;
    color: var(--white);
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.4s;
    word-break: break-word;
  }

  .hero-headline .accent { color: var(--red); }

  .hero-sub {
    font-size: clamp(14px, 2vw, 16px);
    line-height: 1.7;
    color: var(--muted);
    max-width: 420px;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.6s;
  }

  .hero-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.8s;
  }

  .btn-primary {
    background: var(--red);
    color: var(--white);
    border: none;
    padding: 14px 32px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }

  .btn-primary:hover { background: #c9291a; transform: translateY(-1px); }

  .btn-ghost {
    text-decoration: none;
    display: inline-block;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 14px 32px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }

  .btn-ghost:hover { color: var(--white); border-color: var(--muted); }

  /* HERO RIGHT — BIG NUMBER */
  .hero-right {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 80px 48px;
    border-left: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .big-number-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.5s;
  }

  .big-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(84px, 18vw, 220px);
    line-height: 1;
    color: var(--red);
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.7s;
    position: relative;
    word-break: break-word;
  }

  .big-number-unit {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 5vw, 64px);
    color: var(--dim);
    display: block;
    margin-top: -8px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.9s;
  }

  .big-number-desc {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    max-width: 320px;
    margin-top: 24px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.1s;
  }

  .hero-right::after {
    content: '';
    position: absolute;
    bottom: -100px;
    right: -100px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(232,52,26,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* TICKER */
  .ticker-wrap {
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: var(--dim);
    overflow: hidden;
    padding: 12px 0;
    position: relative;
  }

  .ticker {
    display: flex;
    gap: 80px;
    animation: ticker 30s linear infinite;
    white-space: nowrap;
  }

  .ticker-item {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .ticker-item .ratio {
    color: var(--white);
    font-weight: 500;
  }

  .ticker-item .ratio.good { color: #4ade80; }
  .ticker-item .ratio.bad { color: var(--red); }

  .ticker-dot {
    width: 4px;
    height: 4px;
    background: var(--border);
    border-radius: 50%;
  }

  @keyframes ticker {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* SECTION HEADER */
  .section-header {
    padding: 0 48px;
    margin-bottom: 48px;
    display: flex;
    align-items: baseline;
    gap: 24px;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 4vw, 56px);
    color: var(--white);
    letter-spacing: 0.02em;
  }

  /* ORG CARDS */
  .orgs-section {
    padding: 100px 48px;
    border-top: 1px solid var(--border);
  }

  .orgs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-top: 48px;
  }

  .org-card {
    background: var(--card);
    padding: 32px;
    transition: background 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .org-card:hover { background: #1a1a1a; }

  .org-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    background: var(--red);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.3s ease;
  }

  .org-card:hover::before { transform: scaleY(1); }

  .org-category {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .org-name {
    font-size: 17px;
    font-weight: 500;
    color: var(--white);
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .org-location {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .
